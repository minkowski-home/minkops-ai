version: 2

sources:
  - name: minkops_app
    description: >
      The operational PostgreSQL database for the Minkops AI agent platform.
            All tables here are written by the application layer and treated as
            read-only from dbt's perspective.
    database: minkops_app
    schema: public

    tables:
      - name: tenants

      - name: analytics_agent_run_metrics
        loaded_at_field: created_at
        freshness:
          warn_after: { count: 12, period: hour }
          error_after: { count: 24, period: hour }

      - name: synthetic_orders
        loaded_at_field: created_at
        freshness:
          warn_after: { count: 12, period: hour }
          error_after: { count: 24, period: hour }
